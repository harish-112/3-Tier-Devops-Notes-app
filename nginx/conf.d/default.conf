# Upstream blocks give backend services a name Nginx can reference
# The hostnames here are Docker service names — resolved by notesnet
upstream frontend {
    server frontend:80;
}

upstream api {
    server api:8000;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    server_name _;                  # catch-all — matches any hostname

    # Let's Encrypt challenge files still need to reach the cert bot over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://localhost:8443$request_uri;
    }
}

# ── Main HTTPS server ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    # Modern TLS only — no TLS 1.0/1.1
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers — these cost nothing and matter a lot
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── API traffic ──────────────────────────────────────────────────────
    # Any request to /api/... gets stripped of /api and sent to FastAPI
    # Example: GET /api/notes → GET /notes on port 8000
    location /api/ {
    proxy_pass http://api/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host; # <--- Changed from $host to $http_host to preserve custom ports
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts — tune based on your slowest API call
    proxy_connect_timeout  10s;
    proxy_send_timeout     30s;
    proxy_read_timeout     30s;
    }

    # ── Frontend (catch-all) ─────────────────────────────────────────────
    # Everything else goes to React; Nginx in the frontend container
    # handles client-side routing (try_files → index.html)
    
    location / {
        proxy_pass         http://frontend/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket support — needed if you later add hot-reload or live features
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
