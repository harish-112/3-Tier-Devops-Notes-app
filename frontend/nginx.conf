server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Send all routes to index.html (React Router handles the rest)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Longer cache for hashed assets (Vite fingerprints them)
    location ~* \.(js|css|png|jpg|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}