name: CI/CD — Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip" 

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check backend/app/
 
  build-push:
    name: Build Docker Images and Push to GHCR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write 

    outputs:
      tag: ${{ steps.tag.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }} 

      - name: Set image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/notes-frontend:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/notes-frontend:latest
          cache-from: type=gha
          cache-to: type=gha, mode=max

      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/notes-api:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/notes-api:latest
          cache-from: type=gha
          cache-to: type=gha, mode=max

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    env:
      name: production
      url: https://${{ secrets.VM_HOST }}

    steps:
      - uses: actions/checkout@v4

      - name: Write .env file from secret
        run: echo "${{ secrets.ENV_FILE_CONTENTS }}" > .env

      - name: Copy project files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,.env,nginx/"
          target: "~/notes-app"

      - name: Execute Remote Deployment Script
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.tag }}
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,GH_ACTOR,GH_TOKEN
          script: |
            set -euo pipefail
            cd ~/notes-app
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin
            
            # Inject the unique image tag
            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            
            docker compose pull frontend api
            docker compose up -d postgres redis nginx
            docker compose up -d --no-deps --remove-orphans api
            sleep 8
            docker compose up -d --no-deps --remove-orphans frontend
            
            # Live-reload Nginx routing rules safely
            docker compose exec -T nginx nginx -s reload
       
            #Smoke Test (Validates successful HTTP 200 connection status)
            STATUS_CODE=$(curl -o /dev/null -s -w "%{http_code}" -k https://localhost:8443/api/health)
            if [ "$STATUS_CODE" -ne 200 ]; then
              echo "Deployment failed health check! Received Status: $STATUS_CODE"
              docker compose logs --tail=50 api
              exit 1
            else
              echo "Smoke test passed cleanly with Status: $STATUS_CODE!"
            fi
