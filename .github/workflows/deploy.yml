name: CI/CD — Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  # Automatically sets to ghcr.io/your-github-username/notes-app
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ── JOB 1: TEST ─────────────────────────────────────────────────────────────
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ── JOB 2: BUILD AND PUSH ───────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' # Only build on merges to main
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Generate Short SHA Tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha, mode=max

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha
          cache-to: type=gha, mode=max

  # ── JOB 3: DEPLOY TO AZURE VM ───────────────────────────────────────────────
  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Recreate .env file from GitHub Secret
        run: |
          echo "${{ secrets.ENV_FILE_CONTENTS }}" > .env

      - name: Copy configurations and files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,.env,nginx/,scripts/"
          target: "/home/${{ secrets.VM_USER }}/notes-app"

      - name: SSH into VM and update containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /home/${{ secrets.VM_USER }}/notes-app
            
            # Inject the current deployment tag into the active environment
            export IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            
            # Authenticate VM with container registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull down the freshly built layers
            docker compose pull frontend api
            
            # Verify Nginx mapping is syntactically correct before swapping containers
            docker compose exec -T nginx nginx -t 2>/dev/null || true
            
            # Zero-downtime-ish rolling restart (API updates first, then Frontend)
            docker compose up -d --no-deps --remove-orphans api
            sleep 8
            docker compose up -d --no-deps --remove-orphans frontend
            sleep 3
            
            # Safely reload Nginx routing rules cleanly without connection drops
            docker compose exec -T nginx nginx -s reload
            
            # Smoke test verification
            curl -fsk https://localhost/api/health | grep '"status":"ok"' || (echo "Deployment failed health check!" && exit 1)
            
            echo "Successfully deployed version: ${IMAGE_TAG}"
            docker compose ps