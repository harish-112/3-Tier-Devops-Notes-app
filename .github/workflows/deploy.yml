name: CI/CD — Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip" # Caches packages so subsequent runs are much faster

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check backend/app/
